networks:
  finshield-net:
    driver: bridge

volumes:
  postgres-data:
  vault-data:
  elasticsearch-data:

services:

  # ── 1. FinShield Application ──────────────────────────────────────────────
  finshield-api:
    build:
      context: ./app/backend        # relative to THIS file (project root)
      dockerfile: Dockerfile
    image: finshield-api:latest
    container_name: finshield-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_VERSION=1.0.0
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=finshield-root-token
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=finshield
      - DB_USER=finshield
      - DB_PASSWORD=finshield_secret
    depends_on:
      - vault
      - postgres
    networks:
      - finshield-net

  # ── 2. PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finshield-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=finshield
      - POSTGRES_USER=finshield
      - POSTGRES_PASSWORD=finshield_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finshield-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. HashiCorp Vault ────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: finshield-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=finshield-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    command: server -dev
    volumes:
      - vault-data:/vault/data
    networks:
      - finshield-net

  # ── 4. Vault Init (one-shot) ──────────────────────────────────────────────
  vault-init:
    image: hashicorp/vault:1.17
    container_name: finshield-vault-init
    restart: "no"
    depends_on:
      - vault
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=finshield-root-token
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        vault kv put secret/finshield/database \
          host=postgres port=5432 name=finshield \
          user=finshield password=finshield_secret
        vault kv put secret/finshield/api-keys \
          fraud_api_key=fs-fraud-key-xyz \
          jwt_secret=finshield-jwt-super-secret
        echo "Vault secrets initialized"
    networks:
      - finshield-net

  # ── 5. Elasticsearch ──────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: finshield-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - finshield-net

  # ── 6. Logstash ───────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: finshield-logstash
    restart: unless-stopped
    volumes:
      - ./monitoring/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
      - "5000:5000/udp"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      - elasticsearch
    networks:
      - finshield-net

  # ── 7. Kibana ─────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: finshield-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - finshield-net

