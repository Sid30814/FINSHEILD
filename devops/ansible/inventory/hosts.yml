---
# FinShield — Ansible Inventory
# Replace IP with your deployment server IP

all:
  children:
    finshield_servers:
      hosts:
        finshield-prod:
          ansible_host: 192.168.1.100      # ← Replace with your server IP
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/finshield_key
          ansible_python_interpreter: /usr/bin/python3
